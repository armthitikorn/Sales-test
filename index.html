<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Telesales Simulator PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .mic-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .chat-area { height: calc(100vh - 280px); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <div id="welcome-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 text-white p-6 text-center">
        <div class="max-w-sm">
            <h1 class="text-4xl font-bold mb-4 text-blue-400 uppercase tracking-widest">Exam Mode</h1>
            <p class="mb-10 text-slate-400">ระบบฝึกฝนการขายและประเมินผล 17 ข้อ<br><span class="text-red-400 font-bold">* กรุณาปิดโหมดสั่น และเปิดเสียงโทรศัพท์ให้สุด *</span></p>
            <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 text-white w-full py-5 rounded-full text-2xl font-bold shadow-2xl transition-all active:scale-95">
                เริ่มบททดสอบ
            </button>
        </div>
    </div>

    <header class="p-4 bg-white border-b flex justify-between items-center shadow-md z-10">
        <div class="flex items-center gap-3">
            <div id="avatar" class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold transition-all duration-300">P</div>
            <div>
                <h2 id="display-name" class="font-bold text-slate-800 text-sm">คุณเปรมวดี</h2>
                <span class="text-[10px] text-green-500 font-bold uppercase tracking-widest">Live Session</span>
            </div>
        </div>
        <div class="flex flex-col gap-1 items-end">
            <select id="level-select" class="bg-slate-50 border border-slate-200 rounded-md px-1 py-1 text-[10px] outline-none">
                <option value="1">Level 1: คุณเปรมวดี (ใจดี)</option>
                <option value="2">Level 2: คุณสมเกียรติ (เน้นเหตุผล)</option>
                <option value="3">Level 3: คุณฤทัย (สายเหวี่ยง)</option>
                <option value="4">Level 4: คุณฐิติกร (บิ๊กบอส)</option>
            </select>
            <button id="end-call-btn" class="bg-red-500 text-white px-3 py-1 rounded text-[10px] font-bold uppercase shadow-sm">จบการสนทนา</button>
        </div>
    </header>

    <main id="chat-window" class="chat-area overflow-y-auto p-4 flex flex-col gap-4"></main>

    <footer class="p-6 bg-white border-t flex flex-col items-center gap-2 shadow-inner">
        <button id="mic-btn" class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-xl transition-all active:scale-90 touch-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
        </button>
        <p id="instruction" class="text-slate-400 text-xs">แตะไมค์แล้วเริ่มพูด</p>
        <div id="user-transcript" class="text-blue-500 text-[10px] italic h-4 overflow-hidden text-center"></div>
    </footer>

    <!-- Modal สรุปผล -->
    <div id="eval-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-slate-900/95 backdrop-blur-sm p-4">
        <!-- โค้ด Modal เดิม -->
        <div class="bg-white rounded-[2rem] w-full max-w-md overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div id="result-header" class="p-6 text-center text-white bg-blue-600">
                <h3 class="text-2xl font-bold">ผลการทดสอบ</h3>
                <p id="pass-fail-text" class="text-xs font-bold mt-1 bg-white/20 px-4 py-1 rounded-full inline-block uppercase"></p>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-4">
                <div class="flex justify-center">
                    <div class="w-24 h-24 rounded-full border-4 border-slate-100 flex flex-col items-center justify-center bg-blue-50">
                        <span id="score-val" class="text-3xl font-black text-blue-600">0</span>
                        <p class="text-[8px] text-blue-400 font-bold uppercase tracking-widest">Score / 100</p>
                    </div>
                </div>
                <div id="eval-details" class="space-y-3"></div>
            </div>
            <div class="p-4 bg-slate-50 border-t flex justify-center">
                <button onclick="location.reload()" class="bg-slate-900 text-white px-10 py-3 rounded-full font-bold shadow-lg">ฝึกใหม่อีกครั้ง</button>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const micBtn = document.getElementById('mic-btn');
        const instruction = document.getElementById('instruction');
        const userTranscript = document.getElementById('user-transcript');
        const levelSelect = document.getElementById('level-select');
        const displayName = document.getElementById('display-name');
        const avatar = document.getElementById('avatar');
        const endCallBtn = document.getElementById('end-call-btn');
        const welcomeScreen = document.getElementById('welcome-screen');

        const charData = {
            "1": { name: "คุณเปรมวดี", initial: "P", color: "bg-blue-600", intro: "ฮัลโหลค่ะ... สวัสดีค่ะ? เปรมวดีพูดสายอยู่ค่ะ" },
            "2": { name: "คุณสมเกียรติ", initial: "S", color: "bg-slate-700", intro: "ครับ สวัสดีครับ สมเกียรติรับสายครับ ไม่ทราบว่าติดต่อเรื่องอะไรครับ?" },
            "3": { name: "คุณฤทัย", initial: "R", color: "bg-pink-600", intro: "ฮัลโหล! ใครคะเนี่ย? ฤทัยรับสายค่ะ พอดีรีบอยู่มีอะไรไหมคะ?" },
            "4": { name: "คุณฐิติกร", initial: "T", color: "bg-amber-600", intro: "สวัสดีครับ ฐิติกรพูดสายครับ มีเวลาให้ 2 นาทีนะครับ" }
        };

        let history = [];
        let recognition;
        let isProcessing = false;
        
        // 1. สร้าง Audio Player และบังคับการตั้งค่าสำหรับมือถือ
        const audioPlayer = new Audio();
        audioPlayer.setAttribute('playsinline', ''); 
        audioPlayer.volume = 1.0;

        // 2. ฟังก์ชันแปลง Base64 เป็น Blob URL (เสถียรกว่าบน iOS)
        function b64toBlobUrl(b64Data, contentType='audio/mp3') {
            try {
                const byteCharacters = atob(b64Data);
                const byteArrays = [];
                for (let offset = 0; offset < byteCharacters.length; offset += 512) {
                    const slice = byteCharacters.slice(offset, offset + 512);
                    const byteNumbers = new Array(slice.length);
                    for (let i = 0; i < slice.length; i++) {
                        byteNumbers[i] = slice.charCodeAt(i);
                    }
                    const byteArray = new Uint8Array(byteNumbers);
                    byteArrays.push(byteArray);
                }
                const blob = new Blob(byteArrays, {type: contentType});
                return URL.createObjectURL(blob);
            } catch (e) {
                console.error("Blob conversion error:", e);
                return null;
            }
        }

        function updateCustomerUI(level) {
            const char = charData[level] || charData["1"];
            displayName.innerText = char.name;
            avatar.innerText = char.initial;
            avatar.className = `w-10 h-10 rounded-full flex items-center justify-center text-white font-bold transition-all ${char.color}`;
        }

        levelSelect.addEventListener('change', (e) => {
            const level = e.target.value;
            updateCustomerUI(level);
            history = [];
            chatWindow.innerHTML = '';
            appendMessage('bot', `เชื่อมต่อสายกับ ${charData[level].name} แล้วค่ะ...`);
        });

        // ตั้งค่า SpeechRecognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'th-TH';
            recognition.interimResults = false; // ปิดเพื่อความเสถียรบนมือถือ
            recognition.continuous = false;

            recognition.onstart = () => { 
                micBtn.classList.add('mic-active'); 
                instruction.innerText = "กำลังฟัง..."; 
            };
            
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                userTranscript.innerText = `พูดว่า: ${text}`;
                if (!isProcessing) {
                    isProcessing = true;
                    sendToAI(text);
                }
            };

            recognition.onerror = (event) => {
                micBtn.classList.remove('mic-active'); 
                instruction.innerText = "แตะไมค์อีกครั้ง (Error: " + event.error + ")"; 
                isProcessing = false;
            };

            recognition.onend = () => { 
                micBtn.classList.remove('mic-active'); 
                if(!isProcessing) instruction.innerText = "แตะไมค์เพื่อพูดต่อ"; 
            };
        } else {
            instruction.innerText = "อุปกรณ์นี้ไม่รองรับไมโครโฟน";
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            const char = charData[levelSelect.value];
            updateCustomerUI(levelSelect.value);
            
            // ปลดล็อก Audio บน iOS ด้วยไฟล์เสียงเปล่า (Silence)
            audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
            audioPlayer.play().catch(e => console.log("Init audio bypassed"));
            
            welcomeScreen.classList.add('hidden');
            appendMessage('bot', char.intro);
        });

        micBtn.addEventListener('click', () => { 
            // ให้เล่นเสียงเงียบก่อนเริ่มฟัง เพื่อรักษาบริบทการโต้ตอบผู้ใช้ไว้
            audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
            audioPlayer.play().catch(e => {}); 

            if(recognition && !isProcessing) {
                try { recognition.start(); } catch(e) {}
            } 
        });

        // ฟังก์ชันวาดกล่องข้อความ และคืนค่า Element กลับไปเผื่อต้องเพิ่มปุ่มทีหลัง
        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `max-w-[85%] p-3 rounded-2xl text-sm ${role === 'user' ? 'bg-blue-600 text-white self-end rounded-tr-none shadow-md' : 'bg-white text-slate-800 self-start border border-slate-100 rounded-tl-none shadow-sm'}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            return div;
        }

        async function sendToAI(message) {
            appendMessage('user', message);
            userTranscript.innerText = "กำลังประมวลผล..."; 
            instruction.innerText = "รอ AI ตอบกลับ...";
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, history, level: levelSelect.value })
                });
                const data = await res.json();
                
                // วาดข้อความ AI
                const botMessageDiv = appendMessage('bot', data.text);
                
                history.push({ role: "user", content: message });
                history.push({ role: "assistant", content: data.text });

                if (data.audio) {
                    const blobUrl = b64toBlobUrl(data.audio);
                    if (blobUrl) {
                        audioPlayer.src = blobUrl;
                        const playPromise = audioPlayer.play();
                        
                        if (playPromise !== undefined) {
                            playPromise.catch(error => {
                                console.warn("iOS Blocked Audio:", error);
                                // 3. ถ้า iOS บล็อกเสียง ให้แสดงปุ่ม "กดเพื่อฟัง" ใต้ข้อความ
                                const playBtn = document.createElement('button');
                                playBtn.className = "mt-2 bg-slate-200 text-slate-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 active:bg-slate-300";
                                playBtn.innerHTML = `🔊 กดเพื่อฟังเสียง`;
                                playBtn.onclick = () => {
                                    audioPlayer.src = blobUrl;
                                    audioPlayer.play();
                                    playBtn.remove(); // กดเสร็จแล้วลบปุ่มทิ้ง
                                };
                                botMessageDiv.appendChild(playBtn);
                            });
                        }
                    }
                }

                if (data.forceDisconnect) {
                    setTimeout(() => { alert("สายหลุดเนื่องจาก: " + data.text); location.reload(); }, 3000);
                }
            } catch (e) { 
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย"); 
                console.error(e);
            } finally { 
                isProcessing = false; 
                userTranscript.innerText = "";
                instruction.innerText = "แตะไมค์แล้วเริ่มพูด";
            }
        }

        endCallBtn.addEventListener('click', async () => {
            if (history.length < 2) return alert("ยังไม่ได้เริ่มการสนทนาเลยค่ะ");
            endCallBtn.innerText = "กำลังประเมิน...";
            endCallBtn.disabled = true;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history, isEnding: true })
                });
                const data = await res.json();
                const evalData = data.evaluation;
                
                const score = evalData.total_score || 0;
                document.getElementById('eval-modal').classList.remove('hidden');
                
                const isPass = score >= 70;
                document.getElementById('result-header').className = `p-6 text-center text-white ${isPass ? 'bg-green-600' : 'bg-red-600'}`;
                document.getElementById('pass-fail-text').innerText = isPass ? 'ผ่านเกณฑ์ (PASS)' : 'ไม่ผ่านเกณฑ์ (FAIL)';
                document.getElementById('score-val').innerText = score;

                let breakdownHTML = `<div class="bg-slate-50 p-3 rounded-xl text-[10px] border space-y-1 max-h-60 overflow-y-auto shadow-inner">`;
                if(evalData.evaluation_results) {
                    evalData.evaluation_results.forEach(item => {
                        let statusColor = "text-slate-500";
                        if(item.status === "Pass") statusColor = "text-green-600 font-bold";
                        if(item.status === "Fail") statusColor = "text-red-600 font-bold";
                        if(item.status === "Partial") statusColor = "text-amber-500 font-bold";

                        breakdownHTML += `
                            <div class="flex justify-between border-b pb-1 gap-2 border-slate-200">
                                <span class="flex-1"><strong>${item.item}.</strong> ${item.topic}</span>
                                <span class="${statusColor}">${item.status}</span>
                            </div>`;
                    });
                }
                breakdownHTML += `</div>`;
                
                const summary = evalData.summary || {};
                document.getElementById('eval-details').innerHTML = `
                    ${breakdownHTML}
                    <div class="space-y-2 mt-4">
                        <div class="p-3 bg-green-50 rounded-lg border-l-4 border-green-500 text-[11px]">
                            <p class="font-bold text-green-700">จุดเด่น:</p>
                            <p class="text-slate-600">${summary.strengths || '-'}</p>
                        </div>
                        <div class="p-3 bg-red-50 rounded-lg border-l-4 border-red-500 text-[11px]">
                            <p class="font-bold text-red-700">จุดที่ควรปรับปรุง:</p>
                            <p class="text-slate-600">${summary.weaknesses || '-'}</p>
                        </div>
                        <div class="p-3 bg-blue-50 rounded-lg border-l-4 border-blue-500 text-[11px]">
                            <p class="font-bold text-blue-700">คำแนะนำ:</p>
                            <p class="text-slate-600">${summary.feedback || '-'}</p>
                        </div>
                    </div>
                `;
            } catch (e) { 
                console.error(e);
                alert("ระบบประเมินผลขัดข้อง"); 
            }
            finally { 
                endCallBtn.innerText = "จบการสนทนา"; 
                endCallBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
